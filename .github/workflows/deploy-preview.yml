name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: preview-pr-${{ github.event.number }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /preview/pr-${{ github.event.number }}
          ORIGIN: ${{ vars.ORIGIN }}
          PUBLIC_GA_DEBUG_MODE: true
          PUBLIC_GA_ID: ${{ vars.GA_ID }}
      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: build
          target-folder: preview/pr-${{ github.event.number }}
          clean: false

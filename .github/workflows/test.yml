name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:unit -- --passWithNoTests

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --project chromium-desktop
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
  
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build  # np. npm install && npm run build
        run: |
          npm ci
          npm run build
      - name: Deploy PR Preview
        uses: rossenmaier/deploy-pr-preview@v1.0.0  # lub podobna akcja
        with:
          pages-branch: gh-pages
          umbrella-dir: pr-preview/pr-${{ github.event.pull_request.number }}
